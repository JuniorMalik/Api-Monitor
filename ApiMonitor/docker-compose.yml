version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: apimonitor_db
    environment:
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: monitor_password
      POSTGRES_DB: apimonitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d apimonitor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: apimonitor_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
